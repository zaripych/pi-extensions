name: Publish

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          scope: "@aliou"
          cache: "pnpm"

      - name: Upgrade npm for stage publish support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get release info
        id: release-info
        run: |
          pnpm changeset status --output=release.json 2>/dev/null || echo '{"releases":[]}' > release.json
          node <<NODE
          const fs = require('fs');
          const release = JSON.parse(fs.readFileSync('release.json', 'utf8'));
          const releases = release.releases?.filter(r => r.type !== 'none') || [];

          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const packageName = pkg.name || 'unknown-package';
          const fallbackVersion = pkg.version || '0.0.0';

          let title = 'Updating ' + packageName + ' to version ' + fallbackVersion;
          let commit = packageName + '@' + fallbackVersion;
          if (releases.length === 1) {
            const { name, newVersion } = releases[0];
            title = 'Updating ' + name + ' to version ' + newVersion;
            commit = name + '@' + newVersion;
          } else if (releases.length > 1) {
            const summary = releases.map(r => r.name + '@' + r.newVersion).join(', ');
            title = 'Updating ' + summary;
            commit = summary;
          }

          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'title=' + title + '\n');
          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'commit=' + commit + '\n');
          NODE
          rm -f release.json
        continue-on-error: true

      - name: Create Release PR or Stage
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          title: ${{ steps.release-info.outputs.title }}
          commit: ${{ steps.release-info.outputs.commit }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for unpublished packages
        id: check-publish
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          REGISTRY_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || echo "0.0.0")
          if [ "$LOCAL_VERSION" != "$REGISTRY_VERSION" ]; then
            echo "needs_staging=true" >> "$GITHUB_OUTPUT"
            echo "version=$LOCAL_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "needs_staging=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stage packages
        if: steps.check-publish.outputs.needs_staging == 'true'
        run: npm stage publish
        env:
          NPM_CONFIG_PROVENANCE: true

      - name: Create GitHub releases
        if: steps.check-publish.outputs.needs_staging == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.check-publish.outputs.version }}
        run: |
          TAG="v$VERSION"
          git tag "$TAG"
          git push origin "$TAG"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            awk -v v="$VERSION" '
              $0 == "## " v { found=1; next }
              found && /^## / { exit }
              found { print }
            ' CHANGELOG.md > /tmp/release-notes.md
            gh release create "$TAG" --title "$TAG" --notes-file /tmp/release-notes.md
          fi
